<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>doTERRA Intelligence Command Center</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Courier, monospace;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 12px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 8px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 255, 136, 0.5);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
        }
        .metric-label {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .metric-value {
            font-size: 32px;
            font-weight: 700;
            color: #00ff88;
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
        }
        .metric-delta {
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        .metric-delta.up {
            background: rgba(0, 255, 0, 0.2);
            color: #00ff88;
        }
        .metric-delta.down {
            background: rgba(255, 0, 0, 0.2);
            color: #ff4444;
        }
        .section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 136, 0.1);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section-title {
            color: #00ff88;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .alert {
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 4px;
            color: #ff9999;
            font-size: 13px;
        }
        .recommendation {
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #00ff88;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 4px;
            color: #00ff88;
            font-size: 13px;
        }
        .no-data {
            color: #666;
            font-style: italic;
            padding: 20px;
            text-align: center;
        }
        .timestamp {
            color: #666;
            font-size: 11px;
            margin-top: 15px;
            text-align: right;
        }
        .refresh-btn {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .refresh-btn:hover {
            background: rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }
        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 4px;
            padding: 12px 16px;
            font-size: 11px;
            color: #00ff88;
        }
        .status.loading::after {
            content: ' ⟳';
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 doTERRA Intelligence Command Center</h1>
        <p class="subtitle">Automated daily insights & operational intelligence</p>
        
        <button class="refresh-btn" onclick="loadIntelligence()">🔄 Refresh Intelligence</button>
        
        <div class="grid" id="metrics-grid">
            <div class="card">
                <div class="metric-label">Monthly Revenue</div>
                <div class="metric-value" id="revenue">—</div>
                <div id="revenue-delta"></div>
            </div>
            
            <div class="card">
                <div class="metric-label">Active Users</div>
                <div class="metric-value" id="active-users">—</div>
                <div id="users-delta"></div>
            </div>
            
            <div class="card">
                <div class="metric-label">System Status</div>
                <div class="metric-value" id="status-badge" style="font-size: 18px;">—</div>
                <div class="metric-delta">Last update: <span id="last-update">never</span></div>
            </div>
        </div>
        
        <div class="section" id="alerts-section" style="display:none;">
            <div class="section-title">🚨 Alerts</div>
            <div id="alerts-list"></div>
        </div>
        
        <div class="section" id="recommendations-section" style="display:none;">
            <div class="section-title">🎯 Action Items</div>
            <div id="recommendations-list"></div>
        </div>
        
        <div class="section" id="analysis-section" style="display:none;">
            <div class="section-title">📊 Analysis</div>
            <div id="analysis-content"></div>
        </div>
        
        <div class="status" id="status-indicator">
            ✓ Ready for next report
        </div>
    </div>
    
    <script>
        async function loadIntelligence() {
            try {
                const statusEl = document.getElementById('status-indicator');
                statusEl.textContent = 'Loading...';
                statusEl.classList.add('loading');
                
                // Load intelligence data
                const response = await fetch('./doterra-data/intelligence.json');
                if (!response.ok) throw new Error('No data available yet');
                
                const data = await response.json();
                
                // Update metrics
                document.getElementById('revenue').textContent = '$' + (data.metrics.revenue || 0).toFixed(0);
                document.getElementById('active-users').textContent = (data.metrics.activeUsers || 0);
                document.getElementById('status-badge').textContent = data.status === 'success' ? '✅ Live' : '⚠️ Pending';
                
                // Update trends
                if (data.analysis.revenueTrend) {
                    const trend = data.analysis.revenueTrend;
                    const deltaEl = document.getElementById('revenue-delta');
                    deltaEl.innerHTML = '<div class="metric-delta ' + trend.direction.toLowerCase() + '">' + 
                        trend.direction + ' ' + Math.abs(trend.percent) + '% vs yesterday</div>';
                }
                
                if (data.analysis.userTrend) {
                    const trend = data.analysis.userTrend;
                    const deltaEl = document.getElementById('users-delta');
                    deltaEl.innerHTML = '<div class="metric-delta ' + trend.direction.toLowerCase() + '">' + 
                        trend.direction + ' ' + Math.abs(trend.delta) + ' users</div>';
                }
                
                // Update alerts
                const alertsSection = document.getElementById('alerts-section');
                const alertsList = document.getElementById('alerts-list');
                if (data.alerts && data.alerts.length > 0) {
                    alertsSection.style.display = 'block';
                    alertsList.innerHTML = data.alerts.map(a => '<div class="alert">' + a + '</div>').join('');
                } else {
                    alertsSection.style.display = 'none';
                }
                
                // Update recommendations
                const recsSection = document.getElementById('recommendations-section');
                const recsList = document.getElementById('recommendations-list');
                if (data.recommendations && data.recommendations.length > 0) {
                    recsSection.style.display = 'block';
                    recsList.innerHTML = data.recommendations.map(r => '<div class="recommendation">' + r + '</div>').join('');
                } else {
                    recsSection.style.display = 'none';
                }
                
                // Update timestamp
                const lastUpdate = new Date(data.timestamp);
                document.getElementById('last-update').textContent = lastUpdate.toLocaleTimeString();
                
                statusEl.textContent = '✓ Ready for next report';
                statusEl.classList.remove('loading');
                
            } catch (error) {
                console.log('Intelligence not available yet. Next report at 6:00 AM.');
                document.getElementById('status-indicator').textContent = '⏳ Waiting for first report...';
                document.getElementById('status-badge').textContent = '⏳ Idle';
            }
        }
        
        // Load on page load and every 5 minutes
        loadIntelligence();
        setInterval(loadIntelligence, 300000);
    </script>
</body>
</html>

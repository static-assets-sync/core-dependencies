<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>doTERRA Operations Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            margin-bottom: 30px;
            text-align: center;
            font-size: 32px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }
        .card-title {
            color: #667eea;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        .card-value {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }
        .card-subtitle {
            color: #888;
            font-size: 12px;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            font-size: 12px;
            color: #666;
        }
        .status.success { color: #388e3c; }
        .status.error { color: #d32f2f; }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
        }
        .status.success .status-dot { background: #388e3c; }
        .status.error .status-dot { background: #d32f2f; }
        .section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .section h2 {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }
        .team-member {
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
            color: #333;
            font-size: 13px;
        }
        .team-member:last-child { border-bottom: none; }
        .last-update {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: opacity 0.3s;
        }
        .refresh-btn:hover { opacity: 0.9; }
        .refresh-btn:active { opacity: 0.8; }
        .controls {
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 doTERRA Operations Dashboard</h1>
        
        <div class="controls">
            <button class="refresh-btn" onclick="loadData()">🔄 Refresh Now</button>
        </div>
        
        <div class="grid" id="metrics-grid">
            <div class="card">
                <div class="card-title">Active Users</div>
                <div class="card-value" id="active-users">—</div>
                <div class="card-subtitle">Current Active Members</div>
            </div>
            
            <div class="card">
                <div class="card-title">Monthly Revenue</div>
                <div class="card-value" id="monthly-revenue">—</div>
                <div class="card-subtitle">Total Commissions</div>
            </div>
            
            <div class="card">
                <div class="card-title">Team Size</div>
                <div class="card-value" id="team-size">—</div>
                <div class="card-subtitle">Downline Members</div>
            </div>
            
            <div class="card">
                <div class="card-title">Launch Status</div>
                <div class="card-value" id="status">—</div>
                <div class="card-subtitle">System Health</div>
            </div>
        </div>
        
        <div class="section">
            <h2>👥 Team Members</h2>
            <div id="team-list">
                <div style="color: #999; text-align: center; padding: 20px;">Loading...</div>
            </div>
        </div>
        
        <div class="last-update">
            Last updated: <span id="last-update">never</span>
        </div>
    </div>
    
    <script>
        async function loadData() {
            try {
                // Try to load from local JSON file
                const response = await fetch('./doterra-data/metrics.json');
                if (!response.ok) throw new Error('No data available yet');
                
                const data = await response.json();
                const metrics = data.metrics;
                const team = data.team;
                
                // Update metrics
                document.getElementById('active-users').textContent = 
                    metrics.activeUsers || '0';
                
                document.getElementById('monthly-revenue').textContent = 
                    '$' + (metrics.monthlyRevenue || 0).toFixed(2);
                
                document.getElementById('team-size').textContent = 
                    team.totalDownline || '0';
                
                document.getElementById('status').textContent = 
                    metrics.status === 'success' ? '✅ Live' : '⚠️ Pending';
                
                // Update team list
                const teamList = document.getElementById('team-list');
                if (team.members && team.members.length > 0) {
                    teamList.innerHTML = team.members
                        .map(member => `<div class="team-member">👤 ${member}</div>`)
                        .join('');
                } else {
                    teamList.innerHTML = '<div style="color: #999; text-align: center; padding: 20px;">No team members recorded yet</div>';
                }
                
                // Update timestamp
                const lastUpdate = new Date(metrics.timestamp);
                document.getElementById('last-update').textContent = 
                    lastUpdate.toLocaleString();
                
            } catch (error) {
                console.log('Data not available yet. Scraper will run at 6 AM daily.');
                document.getElementById('team-list').innerHTML = 
                    '<div style="color: #999; text-align: center; padding: 20px;">⏳ Waiting for first scrape... (scheduled for 6 AM daily)</div>';
            }
        }
        
        // Load data on page load and refresh every 5 minutes
        loadData();
        setInterval(loadData, 300000);
    </script>
</body>
</html>

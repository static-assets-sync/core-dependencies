<!DOCTYPE html>
<html>
<head><title>FloatSpace Auth</title><style>body{font-family:sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0}.box{background:white;padding:40px;border-radius:12px;text-align:center}h2{color:#333}.spinner{border:4px solid #f3f3f3;border-top:4px solid #667eea;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:20px auto}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.success{color:#388e3c}</style></head>
<body><div class="box"><h2>🔐 Signing in...</h2><div class="spinner"></div><p id="status">Processing...</p></div>
<script>
const params=new URLSearchParams(window.location.search);
const code=params.get('code');
const error=params.get('error');
if(error){document.getElementById('status').innerHTML='❌ Error: '+error;setTimeout(()=>{window.location.href='/core-dependencies/?oauth_error=true'},3000)}else if(code){document.getElementById('status').innerHTML='<span class="success">✅ Success!</span>';sessionStorage.setItem('oauth_code',code);sessionStorage.setItem('user_email','student@alpinedistrict.org');setTimeout(()=>{window.location.href='/core-dependencies/?oauth_success=true'},2000)}else{document.getElementById('status').innerHTML='❌ No code received';setTimeout(()=>{window.location.href='/core-dependencies/?oauth_error=true'},3000)}
</script>
</body>
</html>
